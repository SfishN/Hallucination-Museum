<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hallucination Museum</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Hallucination Museum</h1>

    <p class="intro">
      Upload an image. The system will repeatedly describe and regenerate it,
      creating a chain of visual hallucinations.
    </p>

    <section class="upload-section">
      <input type="file" id="imageInput" accept="image/*" />
      <button id="startButton">Start Iteration</button>
    </section>

    <section id="previewSection" class="preview-section">
      <h2>Original Image</h2>
      <img id="originalImage" />
    </section>

    <section>
      <h2>Museum Wall</h2>
      <div id="museumGrid" class="museum-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
